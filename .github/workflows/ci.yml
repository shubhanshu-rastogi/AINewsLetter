name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: backend

env:
  PYTHON_VERSION: "3.12"
  APP_ENV: test

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check app tests scripts
      - name: Ruff format check
        run: ruff format --check app tests scripts

  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true  # advisory: third-party (langgraph/sqlalchemy) typing friction
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements-dev.txt && pip install mypy
      - run: mypy app

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements-dev.txt
      - name: Pytest with coverage gate (90%)
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=90
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements-dev.txt
      - name: Verify migrations upgrade / no-drift / downgrade
        env:
          ALEMBIC_DATABASE_URL: sqlite:///ci_migrations.db
        run: |
          alembic upgrade head
          alembic check
          alembic downgrade base

  security:
    runs-on: ubuntu-latest
    continue-on-error: true  # advisory: surfaces CVEs without blocking the build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pip-audit bandit
      - name: Dependency vulnerability scan
        run: pip-audit -r requirements.txt || true
      - name: Static security scan
        run: bandit -q -r app -x app/agents || true

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test, migrations]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ainewsletter-api:ci backend
